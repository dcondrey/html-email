            <!--
              ================================================================
              30-hero.html  —  hero image + headline + intro paragraph + CTA slot
              ================================================================
              Design rule carried from the 2014 original: the HEADLINE that must
              look on-brand is baked into the hero IMAGE, while the PARAGRAPH is
              live HTML (selectable, translatable, dark-mode aware, and visible
              when images are blocked). Never put body copy in an image.

              - width="600" attribute + class="fluid" = full width on desktop,
                shrinks to screen on mobile, never upscales in Outlook.
              - The <td> has an explicit bgcolor so Gmail's dark-mode engine does
                not paint its own background behind a transparent PNG.

              OPTIONAL: to bake text OVER a background image (the 2014 signature
              trick — still the only way to get a background image behind text in
              classic Outlook), wrap the cell in a VML v:rect + v:fill(type=frame)
              + v:textbox. The full copy-paste snippet is in the README section
              "Text over a background image" (kept out of this comment because
              nested HTML comments are illegal and would break the markup).
            -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="darkmode-card" style="background-color:#ffffff;">
              <tr>
                <td align="center" valign="top" style="padding:0;">
                  <a href="{{heroLinkUrl}}" target="_blank" style="text-decoration:none;">
                    <img class="fluid" src="{{heroImageUrl}}" width="600" alt="{{heroImageAlt}}" style="width:100%; max-width:600px; height:auto; display:block; border:0;">
                  </a>
                </td>
              </tr>
              <tr>
                <td align="center" valign="top" class="darkmode-text pad-on-narrow" style="padding:32px 40px 8px 40px; font-family:Georgia,'Times New Roman',serif; font-size:28px; line-height:34px; color:#1b1b1b; font-weight:normal;">
                  {{heroHeadline}}
                </td>
              </tr>
              <tr>
                <td align="center" valign="top" class="darkmode-text pad-on-narrow" style="padding:8px 40px 28px 40px; font-family:Arial,Helvetica,sans-serif; font-size:16px; line-height:24px; color:#4a4a4a;">
                  {{heroParagraph}}
                </td>
              </tr>

              <!-- {{>button}} -->

              <tr><td style="height:16px; line-height:16px; font-size:0;">&nbsp;</td></tr>
            </table>
